apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: langgraph-app
# NOTE: the backend-secrets Secret is NOT managed here. Create it once from your
# gitignored .env before applying:
#   kubectl -n langgraph-app create secret generic backend-secrets --from-env-file=.env
resources:
  - 00-namespace.yaml
  - 01-storageclass.yaml
  - 02-redis.yaml
  - 03-backend.yaml
  - 04-frontend.yaml
