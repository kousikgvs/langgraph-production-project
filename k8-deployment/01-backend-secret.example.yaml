# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE ONLY — DO NOT PUT REAL CREDENTIALS HERE.
#
# Preferred: create the Secret from your gitignored .env (never committed):
#   kubectl -n langgraph-app create secret generic backend-secrets \
#     --from-env-file=.env
#
# Alternative (manual): copy this file to 01-backend-secret.yaml, fill in the
# real value, and apply it. That file is gitignored (k8-deployment/*-secret.yaml)
# so it will not be committed.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: langgraph-app
type: Opaque
stringData:
  GROQ_API_KEY: "replace-me-with-your-groq-api-key"
